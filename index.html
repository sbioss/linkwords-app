<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <link rel="manifest" href="manifest.json" />
  <title>LinkWords EN-PT</title>
  <style>
    :root{
      --bg:#0b1220; --panel:#111827; --card:#1f2937; --line:#334155; --txt:#e5e7eb;
      --muted:#94a3b8; --ok:#16a34a; --err:#dc2626; --sel:#f59e0b;
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(135deg,#020617,#0f172a);color:var(--txt);font-family:Inter,Arial,sans-serif}
    .app{max-width:980px;margin:0 auto;padding:14px}
    .top{display:grid;grid-template-columns:1fr auto auto auto auto;gap:8px;align-items:center}
    .title{font-weight:700}
    .pill{border:1px solid var(--line);background:#0a1325;border-radius:999px;padding:7px 10px;color:var(--muted);font-size:13px}
    .pill b{color:var(--txt)}
    .board{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    .col{background:#0a1325;border:1px solid var(--line);border-radius:12px;padding:10px}
    .col h3{margin:0 0 8px;color:var(--muted);font-size:13px}
    .list{display:grid;gap:8px;min-height:360px}
    .card{
      border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:10px;
      padding:12px;min-height:48px;text-align:left;font-weight:600;font-size:15px
    }
    .card.selected{outline:2px solid var(--sel);border-color:var(--sel)}
    .card.ok{border-color:var(--ok);background:rgba(22,163,74,.18)}
    .card.err{border-color:var(--err);background:rgba(220,38,38,.18)}
    .controls{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    button,select{
      background:#111827;color:var(--txt);border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-weight:600
    }
    .msg{margin-top:10px;min-height:20px;color:var(--muted);font-size:14px}
    .unanswered{display:none;margin-top:10px;border:1px solid var(--line);background:#0a1325;border-radius:10px;padding:10px}
    .unanswered h4{margin:0 0 6px;font-size:14px}
    .unanswered ul{margin:0;padding-left:18px;font-size:13px;color:#cbd5e1}
    @media (max-width:820px){
      .top{grid-template-columns:1fr 1fr 1fr}
      .board{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div class="title">🎯 LinkWords (EN ↔ PT)</div>
      <div class="pill">Nível: <b id="level">A1</b></div>
      <div class="pill">Acertos total: <b id="xp">0</b></div>
      <div class="pill">Rodada: <b id="roundScore">0</b></div>
      <div class="pill">Tempo: <b id="time">120</b>s</div>
    </div>

    <div class="board">
      <div class="col">
        <h3>INGLÊS</h3>
        <div id="enList" class="list"></div>
      </div>
      <div class="col">
        <h3>PORTUGUÊS</h3>
        <div id="ptList" class="list"></div>
      </div>
    </div>

    <div class="controls">
      <button id="newRoundBtn">Nova partida</button>
      <button id="addTimeBtn">+30s</button>
      <button id="fullResetBtn">Zerar progresso</button>
      <button id="pickJsonBtn">Escolher JSON</button>
      <button id="useDefaultBtn">Usar padrão</button>

      <select id="reportFormat">
        <option value="json">Relatório JSON</option>
        <option value="csv">Relatório CSV</option>
      </select>
      <button id="reportBtn">Gerar relatório</button>
    </div>

    <input id="fileInput" type="file" accept=".json,application/json" hidden />

    <div id="msg" class="msg"></div>

    <div id="unansweredBox" class="unanswered">
      <h4>Itens que ficaram sem resposta nesta partida</h4>
      <ul id="unansweredList"></ul>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
